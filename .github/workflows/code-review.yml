# Revisão agêntica em PRs — duas engines em paralelo (jobs independentes).
# Cada job aparece como check separado no GitHub; não há dependência `needs:` entre eles.
name: Cursor Code Review

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  pull-requests: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Engine padrão — @cursor/sdk (produção / CI principal)
  # ---------------------------------------------------------------------------
  review-cursor-sdk:
    name: Review (cursor-sdk)
    runs-on: ubuntu-latest
    concurrency:
      group: review-cursor-sdk-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck TypeScript
        run: npm run typecheck

      - name: Run Reviewer Agent (cursor-sdk)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_REVIEWER_ENGINE: cursor-sdk
          CURSOR_REVIEWER_MODEL: composer-2.5
          CURSOR_REVIEWER_BOT_TAG: '[Cursor Reviewer]'
          CURSOR_REVIEWER_REVIEW_SELF: 'true'
        run: |
          npx tsx src/index.ts --gh \
            --pr-id ${{ github.event.pull_request.number }} \
            --source-branch "${{ github.head_ref }}" \
            --target-branch "refs/heads/${{ github.event.pull_request.base.ref }}"
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Engine OpenCode — @opencode-ai/sdk (referência; servidor embutido no runner)
  # Requer secret OPENCODE_GO_API_KEY (mesma chave do provider opencode-go local).
  # ---------------------------------------------------------------------------
  review-opencode:
    name: Review (opencode)
    runs-on: ubuntu-latest
    concurrency:
      group: review-opencode-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Configure OpenCode Go credentials
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
        run: |
          if [ -z "$OPENCODE_GO_API_KEY" ]; then
            echo "::error::Secret OPENCODE_GO_API_KEY não configurado. Adicione em Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.local/share/opencode
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const authPath = path.join(process.env.HOME, '.local/share/opencode/auth.json');
          const auth = {
            'opencode-go': { type: 'api', key: process.env.OPENCODE_GO_API_KEY },
          };
          fs.writeFileSync(authPath, JSON.stringify(auth, null, 2));
          NODE

      - name: Run Reviewer Agent (opencode)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_REVIEWER_ENGINE: opencode
          CURSOR_REVIEWER_MODEL: opencode-go/deepseek-v4-flash
          CURSOR_REVIEWER_OPENCODE_HOSTNAME: 127.0.0.1
          CURSOR_REVIEWER_OPENCODE_PORT: '4096'
          CURSOR_REVIEWER_OPENCODE_AGENT: explore
          CURSOR_REVIEWER_BOT_TAG: '[Cursor Reviewer · OpenCode]'
          CURSOR_REVIEWER_REVIEW_SELF: 'true'
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
        run: |
          npx tsx src/index.ts --gh \
            --pr-id ${{ github.event.pull_request.number }} \
            --source-branch "${{ github.head_ref }}" \
            --target-branch "refs/heads/${{ github.event.pull_request.base.ref }}"
        continue-on-error: true
